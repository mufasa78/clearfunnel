openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ClearFunnel Hiring Governance Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rules
    description: Rule Registry
  - name: decisions
    description: Decision Log
  - name: candidates
    description: Candidate Recovery Pool
  - name: alerts
    description: Anomaly Alerts
  - name: validation
    description: Validation Harness
  - name: benchmarks
    description: Benchmark Resumes
  - name: roles
    description: Job Roles
  - name: dashboard
    description: Dashboard summaries
  - name: governance
    description: Governance intelligence

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Roles ───────────────────────────────────────────────────
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List all job roles
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create a job role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{id}:
    get:
      operationId: getRole
      tags: [roles]
      summary: Get a role by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "404":
          description: Not found

  # ─── Filter Rules ─────────────────────────────────────────────
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List all filter rules with performance metrics
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, pending_validation]
        - name: roleId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Rules with performance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleListResponse"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a new filter rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterRule"

  /rules/{id}:
    get:
      operationId: getRule
      tags: [rules]
      summary: Get a filter rule with version history and validation runs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Filter rule with history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterRuleDetail"
        "404":
          description: Not found
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a filter rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRuleUpdate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterRule"
    delete:
      operationId: archiveRule
      tags: [rules]
      summary: Archive a filter rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived

  /rules/{id}/validate:
    post:
      operationId: triggerRuleValidation
      tags: [rules]
      summary: Manually trigger a validation run for a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Validation run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRun"

  # ─── Validation Runs ──────────────────────────────────────────
  /validation-runs:
    get:
      operationId: listValidationRuns
      tags: [validation]
      summary: List all validation runs
      parameters:
        - name: ruleId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, passed, failed]
      responses:
        "200":
          description: List of validation runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationRun"

  /validation-runs/{id}:
    get:
      operationId: getValidationRun
      tags: [validation]
      summary: Get a validation run with results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Validation run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRunDetail"
        "404":
          description: Not found

  # ─── Benchmark Resumes ────────────────────────────────────────
  /benchmark-resumes:
    get:
      operationId: listBenchmarkResumes
      tags: [benchmarks]
      summary: List benchmark resumes in the test harness
      responses:
        "200":
          description: List of benchmark resumes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenchmarkResume"
    post:
      operationId: createBenchmarkResume
      tags: [benchmarks]
      summary: Add a benchmark resume to the test harness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenchmarkResumeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkResume"

  /benchmark-resumes/{id}:
    delete:
      operationId: deleteBenchmarkResume
      tags: [benchmarks]
      summary: Remove a benchmark resume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  # ─── Decisions (Decision Log) ─────────────────────────────────
  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List all auto-rejection decisions with confidence scores
      parameters:
        - name: roleId
          in: query
          schema:
            type: integer
        - name: ruleId
          in: query
          schema:
            type: integer
        - name: recovered
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Decisions with confidence summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionListResponse"

  # ─── Candidates (Recovery Pool) ───────────────────────────────
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List recoverable candidates sorted by Recovery Score
      parameters:
        - name: roleId
          in: query
          schema:
            type: integer
        - name: recovered
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of candidates with recovery scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate with their rejection history and score breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate detail with score breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetail"
        "404":
          description: Not found

  /candidates/{id}/recover:
    post:
      operationId: recoverCandidate
      tags: [candidates]
      summary: Recover a candidate — override the rejection and re-queue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoveryInput"
      responses:
        "200":
          description: Candidate recovered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  # ─── Alerts ───────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List anomaly alerts with statistical data
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved]
        - name: roleId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Alerts with anomaly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertListResponse"

  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Resolve or update an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  # ─── Dashboard ────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: High-level stats including Governance Score and ATS Health
      responses:
        "200":
          description: Dashboard summary with intelligence scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/rejection-rates:
    get:
      operationId: getRejectionRates
      tags: [dashboard]
      summary: Rejection rates over time, by role
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Time-series rejection rate data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RejectionRatePoint"

  /dashboard/rule-impact:
    get:
      operationId: getRuleImpact
      tags: [dashboard]
      summary: Which rules are rejecting the most candidates, with accuracy
      responses:
        "200":
          description: Rule impact breakdown with performance metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleImpact"

  # ─── Governance ───────────────────────────────────────────────
  /governance/score:
    get:
      operationId: getGovernanceScore
      tags: [governance]
      summary: Current Governance Score with historical trend and component breakdown
      responses:
        "200":
          description: Governance score data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceScoreResponse"

  /governance/recruiter-stats:
    get:
      operationId: getRecruiterStats
      tags: [governance]
      summary: Recruiter consistency scores and anomaly flags
      responses:
        "200":
          description: Recruiter consistency data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterStatsResponse"

  /governance/bias-analysis:
    get:
      operationId: getBiasAnalysis
      tags: [governance]
      summary: Bias risk detection across candidate groups
      responses:
        "200":
          description: Bias analysis data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiasAnalysisResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Role ───────────────────────────────────────────────────
    Role:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        department:
          type: ["string", "null"]
        activeRuleCount:
          type: integer
        totalRejections:
          type: integer
        createdAt:
          type: string
          format: date-time

    RoleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        department:
          type: string

    # ─── Filter Rules ────────────────────────────────────────────
    FilterRule:
      type: object
      required: [id, name, description, ruleType, criteria, status, version, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [keyword_match, employment_gap, degree_requirement, experience_years, location, custom]
        criteria:
          type: string
        status:
          type: string
          enum: [active, archived, pending_validation]
        version:
          type: integer
        roleId:
          type: ["integer", "null"]
        roleName:
          type: ["string", "null"]
        lastValidatedAt:
          type: ["string", "null"]
          format: date-time
        validationStatus:
          type: ["string", "null"]
          enum: [passed, failed, not_run, null]
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        # Performance metrics
        triggeredCount:
          type: integer
        correctCount:
          type: integer
        falsePositiveCount:
          type: integer
        falseNegativeCount:
          type: integer
        weightPercent:
          type: integer
          description: Rule importance weight 0-100
        accuracyScore:
          type: number
          description: Percentage of triggered decisions that were correct
        fpRate:
          type: number
          description: False positive rate as a percentage
        fnRate:
          type: number
          description: False negative rate as a percentage
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        optimizerRecommendation:
          type: ["string", "null"]
          description: AI-generated suggestion to improve this rule

    RuleListResponse:
      type: object
      required: [rules, summary]
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/FilterRule"
        summary:
          type: object
          properties:
            totalRules:
              type: integer
            activeRules:
              type: integer
            avgAccuracy:
              type: number
            totalTriggered:
              type: integer
            highRiskRules:
              type: integer
            rulesNeedingAttention:
              type: integer

    FilterRuleDetail:
      type: object
      required: [rule, history, validationRuns]
      properties:
        rule:
          $ref: "#/components/schemas/FilterRule"
        history:
          type: array
          items:
            $ref: "#/components/schemas/RuleHistoryEntry"
        validationRuns:
          type: array
          items:
            $ref: "#/components/schemas/ValidationRun"

    FilterRuleInput:
      type: object
      required: [name, description, ruleType, criteria, createdBy]
      properties:
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
        criteria:
          type: string
        roleId:
          type: integer
        createdBy:
          type: string
        weightPercent:
          type: integer

    FilterRuleUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        criteria:
          type: string
        status:
          type: string
        weightPercent:
          type: integer
        changedBy:
          type: string

    RuleHistoryEntry:
      type: object
      required: [version, changedBy, changes, changedAt]
      properties:
        version:
          type: integer
        changedBy:
          type: string
        changes:
          type: string
        changedAt:
          type: string
          format: date-time

    # ─── Validation ──────────────────────────────────────────────
    ValidationRun:
      type: object
      required: [id, ruleId, status, benchmarkCount, passCount, failCount, startedAt]
      properties:
        id:
          type: integer
        ruleId:
          type: integer
        ruleName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, passed, failed]
        benchmarkCount:
          type: integer
        passCount:
          type: integer
        failCount:
          type: integer
        passRate:
          type: number
          description: Pass percentage
        validationConfidence:
          type: integer
          description: 0-100 confidence in this validation result
        overrideJustification:
          type: ["string", "null"]
        overriddenBy:
          type: ["string", "null"]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/ValidationResult"

    ValidationRunDetail:
      type: object
      required: [run, results]
      properties:
        run:
          $ref: "#/components/schemas/ValidationRun"
        results:
          type: array
          items:
            $ref: "#/components/schemas/ValidationResult"

    ValidationResult:
      type: object
      required: [benchmarkResumeId, candidateName, expectedOutcome, actualOutcome, passed]
      properties:
        benchmarkResumeId:
          type: integer
        candidateName:
          type: string
        expectedOutcome:
          type: string
          enum: [pass, fail]
        actualOutcome:
          type: string
          enum: [pass, fail]
        passed:
          type: boolean
        failReason:
          type: ["string", "null"]

    # ─── Benchmark Resumes ───────────────────────────────────────
    BenchmarkResume:
      type: object
      required: [id, candidateName, scenario, expectedOutcome, background, tags, createdAt]
      properties:
        id:
          type: integer
        candidateName:
          type: string
        scenario:
          type: string
        expectedOutcome:
          type: string
          enum: [pass, fail]
        background:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    BenchmarkResumeInput:
      type: object
      required: [candidateName, scenario, expectedOutcome, background]
      properties:
        candidateName:
          type: string
        scenario:
          type: string
        expectedOutcome:
          type: string
          enum: [pass, fail]
        background:
          type: string
        tags:
          type: array
          items:
            type: string

    # ─── Decisions ───────────────────────────────────────────────
    TriggeredRule:
      type: object
      required: [ruleId, ruleName, ruleDescription]
      properties:
        ruleId:
          type: integer
        ruleName:
          type: string
        ruleDescription:
          type: string
        ruleAccuracy:
          type: ["number", "null"]
        fpRate:
          type: ["number", "null"]
        weightPercent:
          type: ["integer", "null"]

    Decision:
      type: object
      required: [id, candidateId, candidateName, roleId, roleName, triggeredRules, rejectionSummary, rejectedAt, recoverable, recovered]
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        candidateName:
          type: string
        roleId:
          type: integer
        roleName:
          type: string
        triggeredRules:
          type: array
          items:
            $ref: "#/components/schemas/TriggeredRule"
        rejectionSummary:
          type: string
        rejectedAt:
          type: string
          format: date-time
        recoverable:
          type: boolean
        recovered:
          type: boolean
        recoveredAt:
          type: ["string", "null"]
          format: date-time
        recoveredBy:
          type: ["string", "null"]
        # Intelligence fields
        confidenceScore:
          type: ["integer", "null"]
          description: 0-100 Decision Confidence Score
        evidenceStrength:
          type: ["string", "null"]
          enum: [strong, moderate, weak, null]
        evidenceCount:
          type: ["integer", "null"]
        recruiterId:
          type: ["string", "null"]

    DecisionListResponse:
      type: object
      required: [decisions, total]
      properties:
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/Decision"
        total:
          type: integer
        summary:
          type: object
          properties:
            avgConfidence:
              type: integer
            strongDecisions:
              type: integer
            weakDecisions:
              type: integer
            strongPct:
              type: integer
            weakPct:
              type: integer

    DecisionInput:
      type: object
      required: [candidateId, roleId, rejectionSummary]
      properties:
        candidateId:
          type: integer
        roleId:
          type: integer
        rejectionSummary:
          type: string
        recoverable:
          type: boolean
        recruiterId:
          type: string

    # ─── Candidates ──────────────────────────────────────────────
    Candidate:
      type: object
      required: [id, name, email, roleId, roleName, rejectedAt, recovered, retentionExpiresAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        roleId:
          type: integer
        roleName:
          type: string
        department:
          type: ["string", "null"]
        rejectionSummary:
          type: string
        rejectedAt:
          type: string
          format: date-time
        recovered:
          type: boolean
        recoveredAt:
          type: ["string", "null"]
          format: date-time
        recoveredBy:
          type: ["string", "null"]
        recoveryReason:
          type: ["string", "null"]
        retentionExpiresAt:
          type: string
          format: date-time
        # Intelligence fields
        recoveryScore:
          type: ["integer", "null"]
          description: 0-100 Recovery Score — higher = more likely a wrongful rejection
        skillMatch:
          type: ["integer", "null"]
        experienceMatch:
          type: ["integer", "null"]
        educationMatch:
          type: ["integer", "null"]
        rejectionConfidence:
          type: ["integer", "null"]
          description: ATS confidence that the rejection was correct (lower = more likely wrong)
        yearsExperience:
          type: ["integer", "null"]
        educationLevel:
          type: ["string", "null"]
          enum: [high_school, bachelors, masters, phd, null]
        skills:
          type: array
          items:
            type: string
        recruiterRecommendation:
          type: ["string", "null"]
          enum: [recover, review, reject, null]
        similarityWarning:
          type: ["string", "null"]
          description: Similarity to top performers warning

    ScoreComponent:
      type: object
      required: [label, value, weight, contribution]
      properties:
        label:
          type: string
        value:
          type: integer
        weight:
          type: integer
        contribution:
          type: integer

    CandidateDetail:
      type: object
      required: [candidate, decisions, scoreBreakdown]
      properties:
        candidate:
          $ref: "#/components/schemas/Candidate"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/Decision"
        scoreBreakdown:
          type: object
          properties:
            recoveryScore:
              type: integer
            components:
              type: array
              items:
                $ref: "#/components/schemas/ScoreComponent"
            recommendation:
              type: string
              enum: [recover, review, reject]
            explanation:
              type: string

    RecoveryInput:
      type: object
      required: [recoveredBy, reason]
      properties:
        recoveredBy:
          type: string
        reason:
          type: string

    # ─── Alerts ──────────────────────────────────────────────────
    Alert:
      type: object
      required: [id, roleId, roleName, alertType, severity, message, status, detectedAt]
      properties:
        id:
          type: integer
        roleId:
          type: integer
        roleName:
          type: string
        alertType:
          type: string
          enum: [rejection_spike, rejection_drop, validation_failure, rule_change, recruiter_anomaly, bias_detected]
        severity:
          type: string
          enum: [low, medium, high, critical]
        message:
          type: string
        correlatedRuleId:
          type: ["integer", "null"]
        correlatedRuleName:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, resolved]
        detectedAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        resolvedBy:
          type: ["string", "null"]
        # Anomaly detection fields
        zScore:
          type: ["number", "null"]
          description: Statistical deviation from baseline (σ)
        baselineRate:
          type: ["number", "null"]
          description: Normal rejection rate (%)
        currentRate:
          type: ["number", "null"]
          description: Current anomalous rate (%)
        recruiterId:
          type: ["string", "null"]
        affectedCandidates:
          type: ["integer", "null"]
        anomalyLabel:
          type: ["string", "null"]
          description: Human-readable anomaly description e.g. "3.4σ above baseline"

    AlertListResponse:
      type: object
      required: [alerts, summary]
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        summary:
          type: object
          properties:
            totalOpen:
              type: integer
            criticalCount:
              type: integer
            highCount:
              type: integer
            avgZScore:
              type: ["number", "null"]
            totalAffectedCandidates:
              type: integer

    AlertUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, resolved]
        resolvedBy:
          type: string

    # ─── Dashboard ───────────────────────────────────────────────
    RecentDecision:
      type: object
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        candidateName:
          type: string
        roleId:
          type: integer
        roleName:
          type: string
        triggeredRules:
          type: array
          items:
            $ref: "#/components/schemas/TriggeredRule"
        rejectionSummary:
          type: string
        rejectedAt:
          type: string
        recoverable:
          type: boolean
        recovered:
          type: boolean
        recoveredAt:
          type: ["string", "null"]
        recoveredBy:
          type: ["string", "null"]
        confidenceScore:
          type: ["integer", "null"]
        evidenceStrength:
          type: ["string", "null"]

    GovernanceComponents:
      type: object
      properties:
        ruleAccuracy:
          type: integer
        falseRejectionRate:
          type: number
        recoverySuccessRate:
          type: integer
        recruiterConsistency:
          type: integer
        explainabilityCoverage:
          type: integer
        biasRisk:
          type: number
        validationPassRate:
          type: integer

    DashboardSummary:
      type: object
      required: [totalRejections, recoverableCandidates, openAlerts, activeRules, pendingValidations, validationPassRate]
      properties:
        # Core counts
        totalRejections:
          type: integer
        rejectionRateToday:
          type: number
        recoverableCandidates:
          type: integer
        openAlerts:
          type: integer
        activeRules:
          type: integer
        pendingValidations:
          type: integer
        validationPassRate:
          type: number
        # Intelligence scores
        governanceScore:
          type: integer
          description: 0-100 Governance Score
        atsHealthScore:
          type: integer
          description: 0-100 ATS Health Score
        governanceLabel:
          type: string
        avgRuleAccuracy:
          type: number
        highRiskRules:
          type: integer
        recoverySuccessRate:
          type: integer
        # Financial impact
        estimatedRevenueLost:
          type: integer
          description: Estimated USD lost to false rejections per month
        talentLossCost:
          type: integer
        recruiterReworkCost:
          type: integer
        falseRejectionCount:
          type: integer
        governanceComponents:
          $ref: "#/components/schemas/GovernanceComponents"
        recentDecisions:
          type: array
          items:
            $ref: "#/components/schemas/RecentDecision"
        recentAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"

    RejectionRatePoint:
      type: object
      required: [date, roleId, roleName, rejectionRate, totalApplications, totalRejections]
      properties:
        date:
          type: string
          format: date
        roleId:
          type: integer
        roleName:
          type: string
        rejectionRate:
          type: number
        totalApplications:
          type: integer
        totalRejections:
          type: integer
        avgConfidence:
          type: integer

    RuleImpact:
      type: object
      required: [ruleId, ruleName, ruleType, totalRejections, percentageOfAll]
      properties:
        ruleId:
          type: integer
        ruleName:
          type: string
        ruleType:
          type: string
        totalRejections:
          type: integer
        percentageOfAll:
          type: number
        accuracyScore:
          type: number
        falsePositiveCount:
          type: integer
        fpRate:
          type: number
        optimizerRecommendation:
          type: ["string", "null"]

    # ─── Governance ──────────────────────────────────────────────
    GovernanceTrendPoint:
      type: object
      required: [date, governanceScore, atsHealthScore]
      properties:
        date:
          type: string
          format: date
        governanceScore:
          type: integer
        atsHealthScore:
          type: integer

    FinancialImpact:
      type: object
      required: [talentLossCost, recruiterReworkCost, totalCost]
      properties:
        talentLossCost:
          type: integer
        recruiterReworkCost:
          type: integer
        totalCost:
          type: integer

    GovernanceScoreResponse:
      type: object
      required: [governanceScore, atsHealthScore, trend]
      properties:
        governanceScore:
          type: integer
        atsHealthScore:
          type: integer
        components:
          $ref: "#/components/schemas/GovernanceComponents"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceTrendPoint"
        financialImpact:
          $ref: "#/components/schemas/FinancialImpact"
        estimatedRevenueLost:
          type: integer
        falseRejectionCount:
          type: integer

    RecruiterStat:
      type: object
      required: [recruiterId, recruiterName, totalDecisions, rejectionRate, consistencyScore, zScore]
      properties:
        recruiterId:
          type: string
        recruiterName:
          type: string
        department:
          type: ["string", "null"]
        totalDecisions:
          type: integer
        rejectionRate:
          type: number
        recoveryRate:
          type: number
        consistencyScore:
          type: integer
          description: 0-100, higher = more consistent with team
        zScore:
          type: number
          description: Standard deviations from team mean rejection rate
        flagged:
          type: ["string", "null"]
          enum: [inconsistent, bias_risk, overriding_rules, null]

    RecruiterStatsResponse:
      type: object
      required: [recruiters, teamMeanRejectionRate, teamStdDev, teamConsistencyScore]
      properties:
        teamMeanRejectionRate:
          type: number
        teamStdDev:
          type: number
        teamConsistencyScore:
          type: integer
        recruiters:
          type: array
          items:
            $ref: "#/components/schemas/RecruiterStat"

    BiasGroup:
      type: object
      required: [group, total, rejectionRate]
      properties:
        group:
          type: string
        total:
          type: integer
        rejectionRate:
          type: number

    BiasDimension:
      type: object
      required: [name, risk, breakdown]
      properties:
        name:
          type: string
        risk:
          type: integer
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/BiasGroup"

    BiasAnalysisResponse:
      type: object
      required: [biasRisk, dimensions]
      properties:
        biasRisk:
          type: integer
          description: 0-100 overall bias risk score
        dimensions:
          type: array
          items:
            $ref: "#/components/schemas/BiasDimension"
