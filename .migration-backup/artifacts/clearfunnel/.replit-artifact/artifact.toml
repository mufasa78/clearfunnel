kind = "web"
previewPath = "/"
title = "ClearFunnel"
version = "1.0.0"
id = "artifacts/clearfunnel"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19877

[services.development]
run = "pnpm --filter @workspace/clearfunnel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clearfunnel", "run", "build" ]
serve = "static"
publicDir = "artifacts/clearfunnel/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19877"
BASE_PATH = "/"
