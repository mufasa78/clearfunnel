openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ClearFunnel ATS Decision Governance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rules
    description: Rule Registry
  - name: decisions
    description: Decision Log
  - name: candidates
    description: Candidate Recovery Pool
  - name: alerts
    description: Anomaly Alerts
  - name: validation
    description: Validation Harness
  - name: benchmarks
    description: Benchmark Resumes
  - name: roles
    description: Job Roles
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Roles ───────────────────────────────────────────────────
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List all job roles
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create a job role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{id}:
    get:
      operationId: getRole
      tags: [roles]
      summary: Get a role by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "404":
          description: Not found

  # ─── Filter Rules ─────────────────────────────────────────────
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List all filter rules (Rule Registry)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, pending_validation]
        - name: roleId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilterRule"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a new filter rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRuleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterRule"

  /rules/{id}:
    get:
      operationId: getRule
      tags: [rules]
      summary: Get a filter rule with version history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Filter rule with history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterRuleDetail"
        "404":
          description: Not found
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a filter rule (triggers validation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRuleUpdate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterRule"
    delete:
      operationId: archiveRule
      tags: [rules]
      summary: Archive a filter rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived

  /rules/{id}/validate:
    post:
      operationId: triggerRuleValidation
      tags: [rules]
      summary: Manually trigger a validation run for a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Validation run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRun"

  # ─── Validation Runs ──────────────────────────────────────────
  /validation-runs:
    get:
      operationId: listValidationRuns
      tags: [validation]
      summary: List all validation runs
      parameters:
        - name: ruleId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, passed, failed]
      responses:
        "200":
          description: List of validation runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationRun"

  /validation-runs/{id}:
    get:
      operationId: getValidationRun
      tags: [validation]
      summary: Get a validation run with results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Validation run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRunDetail"
        "404":
          description: Not found

  # ─── Benchmark Resumes ────────────────────────────────────────
  /benchmark-resumes:
    get:
      operationId: listBenchmarkResumes
      tags: [benchmarks]
      summary: List benchmark resumes in the test harness
      responses:
        "200":
          description: List of benchmark resumes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenchmarkResume"
    post:
      operationId: createBenchmarkResume
      tags: [benchmarks]
      summary: Add a benchmark resume to the test harness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenchmarkResumeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkResume"

  /benchmark-resumes/{id}:
    delete:
      operationId: deleteBenchmarkResume
      tags: [benchmarks]
      summary: Remove a benchmark resume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  # ─── Decisions (Decision Log) ─────────────────────────────────
  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List all auto-rejection decisions
      parameters:
        - name: roleId
          in: query
          schema:
            type: integer
        - name: ruleId
          in: query
          schema:
            type: integer
        - name: recovered
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionList"
    post:
      operationId: createDecision
      tags: [decisions]
      summary: Log an ATS rejection decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"

  /decisions/{id}:
    get:
      operationId: getDecision
      tags: [decisions]
      summary: Get a decision with full rule trace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Decision detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "404":
          description: Not found

  # ─── Candidates (Recovery Pool) ───────────────────────────────
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List recoverable candidates
      parameters:
        - name: roleId
          in: query
          schema:
            type: integer
        - name: recovered
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate with their rejection history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDetail"
        "404":
          description: Not found

  /candidates/{id}/recover:
    post:
      operationId: recoverCandidate
      tags: [candidates]
      summary: Recover a candidate — override the rejection and re-queue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoveryInput"
      responses:
        "200":
          description: Candidate recovered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  # ─── Alerts ───────────────────────────────────────────────────
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List anomaly alerts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved]
        - name: roleId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Resolve or update an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  # ─── Dashboard ────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: High-level stats for the dashboard overview
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/rejection-rates:
    get:
      operationId: getRejectionRates
      tags: [dashboard]
      summary: Rejection rates over time, by role
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Time-series rejection rate data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RejectionRatePoint"

  /dashboard/rule-impact:
    get:
      operationId: getRuleImpact
      tags: [dashboard]
      summary: Which rules are rejecting the most candidates
      responses:
        "200":
          description: Rule impact breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuleImpact"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Role ───────────────────────────────────────────────────
    Role:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        department:
          type: ["string", "null"]
        activeRuleCount:
          type: integer
        totalRejections:
          type: integer
        createdAt:
          type: string
          format: date-time

    RoleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        department:
          type: string

    # ─── Filter Rules ──────────────────────────────────────────
    FilterRule:
      type: object
      required: [id, name, description, ruleType, status, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [keyword_match, employment_gap, degree_requirement, experience_years, location, custom]
        criteria:
          type: string
          description: Plain-language criteria definition
        status:
          type: string
          enum: [active, archived, pending_validation]
        version:
          type: integer
        roleId:
          type: ["integer", "null"]
        roleName:
          type: ["string", "null"]
        lastValidatedAt:
          type: ["string", "null"]
          format: date-time
        validationStatus:
          type: ["string", "null"]
          enum: [passed, failed, not_run, null]
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FilterRuleInput:
      type: object
      required: [name, description, ruleType, criteria, createdBy]
      properties:
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [keyword_match, employment_gap, degree_requirement, experience_years, location, custom]
        criteria:
          type: string
        roleId:
          type: integer
        createdBy:
          type: string

    FilterRuleUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        criteria:
          type: string
        status:
          type: string
          enum: [active, archived]

    FilterRuleDetail:
      type: object
      required: [rule, history, validationRuns]
      properties:
        rule:
          $ref: "#/components/schemas/FilterRule"
        history:
          type: array
          items:
            $ref: "#/components/schemas/RuleHistoryEntry"
        validationRuns:
          type: array
          items:
            $ref: "#/components/schemas/ValidationRun"

    RuleHistoryEntry:
      type: object
      required: [id, version, changedAt, changedBy, changes]
      properties:
        id:
          type: integer
        version:
          type: integer
        changedAt:
          type: string
          format: date-time
        changedBy:
          type: string
        changes:
          type: string
          description: Human-readable description of what changed

    # ─── Validation ────────────────────────────────────────────
    ValidationRun:
      type: object
      required: [id, ruleId, status, benchmarkCount, passCount, failCount, startedAt]
      properties:
        id:
          type: integer
        ruleId:
          type: integer
        ruleName:
          type: string
        status:
          type: string
          enum: [pending, running, passed, failed]
        benchmarkCount:
          type: integer
        passCount:
          type: integer
        failCount:
          type: integer
        overrideJustification:
          type: ["string", "null"]
        overriddenBy:
          type: ["string", "null"]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time

    ValidationRunDetail:
      type: object
      required: [run, results]
      properties:
        run:
          $ref: "#/components/schemas/ValidationRun"
        results:
          type: array
          items:
            $ref: "#/components/schemas/ValidationResult"

    ValidationResult:
      type: object
      required: [id, benchmarkResumeId, candidateName, expectedOutcome, actualOutcome, passed]
      properties:
        id:
          type: integer
        benchmarkResumeId:
          type: integer
        candidateName:
          type: string
        expectedOutcome:
          type: string
          enum: [pass, fail]
        actualOutcome:
          type: string
          enum: [pass, fail]
        passed:
          type: boolean
        failReason:
          type: ["string", "null"]

    # ─── Benchmark Resumes ─────────────────────────────────────
    BenchmarkResume:
      type: object
      required: [id, candidateName, scenario, expectedOutcome, background, createdAt]
      properties:
        id:
          type: integer
        candidateName:
          type: string
        scenario:
          type: string
          description: Short label like "career changer", "employment gap", "non-traditional path"
        expectedOutcome:
          type: string
          enum: [pass, fail]
        background:
          type: string
          description: Summary of candidate background
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    BenchmarkResumeInput:
      type: object
      required: [candidateName, scenario, expectedOutcome, background]
      properties:
        candidateName:
          type: string
        scenario:
          type: string
        expectedOutcome:
          type: string
          enum: [pass, fail]
        background:
          type: string
        tags:
          type: array
          items:
            type: string

    # ─── Decisions ─────────────────────────────────────────────
    Decision:
      type: object
      required: [id, candidateId, candidateName, roleId, roleName, triggeredRules, rejectionSummary, rejectedAt, recoverable, recovered]
      properties:
        id:
          type: integer
        candidateId:
          type: integer
        candidateName:
          type: string
        roleId:
          type: integer
        roleName:
          type: string
        triggeredRules:
          type: array
          items:
            $ref: "#/components/schemas/TriggeredRule"
        rejectionSummary:
          type: string
          description: Plain-language explanation of why this candidate was rejected
        rejectedAt:
          type: string
          format: date-time
        recoverable:
          type: boolean
        recovered:
          type: boolean
        recoveredAt:
          type: ["string", "null"]
          format: date-time
        recoveredBy:
          type: ["string", "null"]

    DecisionList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Decision"
        total:
          type: integer

    DecisionInput:
      type: object
      required: [candidateId, roleId, triggeredRuleIds]
      properties:
        candidateId:
          type: integer
        roleId:
          type: integer
        triggeredRuleIds:
          type: array
          items:
            type: integer

    TriggeredRule:
      type: object
      required: [ruleId, ruleName, ruleDescription]
      properties:
        ruleId:
          type: integer
        ruleName:
          type: string
        ruleDescription:
          type: string

    # ─── Candidates ────────────────────────────────────────────
    Candidate:
      type: object
      required: [id, name, email, roleId, roleName, rejectedAt, recovered, retentionExpiresAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        roleId:
          type: integer
        roleName:
          type: string
        rejectionSummary:
          type: string
        rejectedAt:
          type: string
          format: date-time
        recovered:
          type: boolean
        recoveredAt:
          type: ["string", "null"]
          format: date-time
        recoveredBy:
          type: ["string", "null"]
        recoveryReason:
          type: ["string", "null"]
        retentionExpiresAt:
          type: string
          format: date-time

    CandidateDetail:
      type: object
      required: [candidate, decisions]
      properties:
        candidate:
          $ref: "#/components/schemas/Candidate"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/Decision"

    RecoveryInput:
      type: object
      required: [recoveredBy, reason]
      properties:
        recoveredBy:
          type: string
        reason:
          type: string

    # ─── Alerts ────────────────────────────────────────────────
    Alert:
      type: object
      required: [id, roleId, roleName, alertType, severity, message, status, detectedAt]
      properties:
        id:
          type: integer
        roleId:
          type: integer
        roleName:
          type: string
        alertType:
          type: string
          enum: [rejection_spike, rejection_drop, validation_failure, rule_change]
        severity:
          type: string
          enum: [low, medium, high, critical]
        message:
          type: string
        correlatedRuleId:
          type: ["integer", "null"]
        correlatedRuleName:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, resolved]
        detectedAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
        resolvedBy:
          type: ["string", "null"]

    AlertUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [open, resolved]
        resolvedBy:
          type: string

    # ─── Dashboard ─────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalRejections, rejectionRateToday, recoverableCandidates, openAlerts, activeRules, pendingValidations, validationPassRate, recentDecisions, recentAlerts]
      properties:
        totalRejections:
          type: integer
        rejectionRateToday:
          type: number
          description: Percentage 0-100
        recoverableCandidates:
          type: integer
        openAlerts:
          type: integer
        activeRules:
          type: integer
        pendingValidations:
          type: integer
        validationPassRate:
          type: number
          description: Percentage 0-100
        recentDecisions:
          type: array
          items:
            $ref: "#/components/schemas/Decision"
        recentAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"

    RejectionRatePoint:
      type: object
      required: [date, roleId, roleName, rejectionRate, totalApplications, totalRejections]
      properties:
        date:
          type: string
          format: date
        roleId:
          type: integer
        roleName:
          type: string
        rejectionRate:
          type: number
        totalApplications:
          type: integer
        totalRejections:
          type: integer

    RuleImpact:
      type: object
      required: [ruleId, ruleName, ruleType, totalRejections, percentageOfAll]
      properties:
        ruleId:
          type: integer
        ruleName:
          type: string
        ruleType:
          type: string
        totalRejections:
          type: integer
        percentageOfAll:
          type: number
